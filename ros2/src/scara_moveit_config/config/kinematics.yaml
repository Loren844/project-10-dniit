# kinematics.yaml — Solveur cinématique MoveIt2
# Robot SCARA 4-DOF  (Phase 4)
#
# KDL est utilisé en fallback générique.
# Pour le VS on utilise la cinématique analytique de vs_controller.py,
# mais MoveIt2 a besoin d'un plugin pour la planification.

scara_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005
  kinematics_solver_attempts: 3
