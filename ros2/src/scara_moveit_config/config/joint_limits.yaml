# joint_limits.yaml — Limites articulaires MoveIt2
# Robot SCARA 4-DOF  (Phase 4)
#
# Correspond aux ScaraParams de vs_controller.py :
#   q_min = [−2.356, 0.000, −1.571, −3.142]
#   q_max = [ 2.356, 0.200,  1.571,  3.142]
#   dq_max= [ 2.0,   0.1,    2.0,    2.0  ]

joint_limits:
  joint1:
    has_velocity_limits: true
    max_velocity: 2.0          # rad/s
    has_acceleration_limits: true
    max_acceleration: 4.0      # rad/s²
    has_position_limits: true
    min_position: -2.356       # −135°
    max_position:  2.356       # +135°

  joint2:
    has_velocity_limits: true
    max_velocity: 0.1          # m/s
    has_acceleration_limits: true
    max_acceleration: 0.5      # m/s²
    has_position_limits: true
    min_position: 0.000        # 0 mm
    max_position: 0.200        # 200 mm

  joint3:
    has_velocity_limits: true
    max_velocity: 2.0          # rad/s
    has_acceleration_limits: true
    max_acceleration: 4.0      # rad/s²
    has_position_limits: true
    min_position: -1.571       # −90°
    max_position:  1.571       # +90°

  joint4:
    has_velocity_limits: true
    max_velocity: 2.0          # rad/s
    has_acceleration_limits: true
    max_acceleration: 6.0      # rad/s²
    has_position_limits: true
    min_position: -3.1416      # −180°
    max_position:  3.1416      # +180°
